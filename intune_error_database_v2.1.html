<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intune Error Database</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0f1117;
  --bg1:#161b24;
  --bg2:#1e2535;
  --bg3:#252d3d;
  --bg4:#2d3748;
  --border:#2a3348;
  --border2:#344060;
  --text0:#e8edf5;
  --text1:#a8b4c8;
  --text2:#6b7a94;
  --accent:#4a9eff;
  --accent-bg:#0d2040;
  --mono-bg:#1a2030;
  --nav-w:210px;
  --top-h:52px;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;background:var(--bg0);color:var(--text0)}
#app{display:flex;flex-direction:column;height:100vh}
#topbar{height:var(--top-h);padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg1);flex-shrink:0;display:flex;align-items:center;gap:14px;z-index:10}
#app-title{font-size:14px;font-weight:600;color:var(--text0);white-space:nowrap;letter-spacing:.01em}
#app-title span{color:var(--accent)}
#search-wrap{position:relative;flex:1;max-width:560px}
#search{width:100%;padding:7px 12px 7px 34px;border:1px solid var(--border2);border-radius:7px;font-size:13px;background:var(--bg2);color:var(--text0);outline:none;transition:border-color .15s}
#search::placeholder{color:var(--text2)}
#search:focus{border-color:var(--accent)}
.s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;width:15px;height:15px}
#search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;z-index:200;max-height:280px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.sr-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--bg3)}
.sr-code{font-family:'Cascadia Code','Consolas',monospace;font-size:11px;background:var(--mono-bg);padding:2px 6px;border-radius:4px;color:var(--text1);flex-shrink:0;border:1px solid var(--border)}
.sr-title{font-size:13px;color:var(--text0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-cat{font-size:11px;color:var(--text2);margin-left:auto;flex-shrink:0;white-space:nowrap}
#body{display:flex;flex:1;overflow:hidden}
#nav{width:var(--nav-w);flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg1);padding:8px 0}
#nav::-webkit-scrollbar{width:4px}
#nav::-webkit-scrollbar-track{background:transparent}
#nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.cat-label{padding:5px 14px;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-top:10px}
.cat-label:first-child{margin-top:0}
.nav-item{padding:6px 14px;cursor:pointer;font-size:13px;color:var(--text1);border-left:2px solid transparent;display:flex;align-items:center;justify-content:space-between;gap:6px;transition:background .1s,color .1s}
.nav-item:hover{background:var(--bg3);color:var(--text0)}
.nav-item.active{background:var(--bg3);color:var(--text0);border-left-color:var(--accent);font-weight:500}
.nav-badge{font-size:10px;background:var(--bg4);color:var(--text2);border-radius:10px;padding:1px 7px;flex-shrink:0}
#main{flex:1;overflow-y:auto;padding:16px 18px;min-width:0}
#main::-webkit-scrollbar{width:4px}
#main::-webkit-scrollbar-track{background:transparent}
#main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.list-hdr{font-size:11px;color:var(--text2);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
#error-list{display:flex;flex-direction:column;gap:7px}
.error-card{border:1px solid var(--border);border-radius:8px;padding:11px 13px;cursor:pointer;background:var(--bg1);transition:border-color .12s,background .12s}
.error-card:hover{border-color:var(--border2);background:var(--bg2)}
.error-card.active{border-color:var(--accent);background:var(--bg2)}
.ec-top{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap}
.ec-code{font-family:'Cascadia Code','Consolas',monospace;font-size:11px;background:var(--mono-bg);padding:2px 7px;border-radius:4px;color:var(--text1);border:1px solid var(--border)}
.ec-title{font-size:13px;font-weight:500;color:var(--text0);line-height:1.4}
.ec-desc{font-size:12px;color:var(--text1);margin-top:3px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
#detail{flex:0 0 0;overflow-y:auto;background:var(--bg0);border-left:1px solid var(--border);display:none;padding:0}
#detail::-webkit-scrollbar{width:4px}
#detail::-webkit-scrollbar-track{background:transparent}
#detail::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#detail.visible{display:flex;flex-direction:column;flex:1;min-width:0;padding:20px 22px}
.detail-code-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.detail-code{font-family:'Cascadia Code','Consolas',monospace;font-size:13px;background:var(--mono-bg);padding:4px 10px;border-radius:7px;color:var(--text1);border:1px solid var(--border2)}
.detail-cat{font-size:11px;padding:3px 10px;border-radius:10px;background:var(--accent-bg);color:var(--accent);margin-left:auto;white-space:nowrap;border:1px solid #1a3a60}
.detail-title{font-size:18px;font-weight:600;color:var(--text0);margin-bottom:8px;line-height:1.4}
.detail-desc{font-size:13px;color:var(--text1);line-height:1.75;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.sec-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:8px}
.causes-list,.steps-list{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.cause-item{display:flex;gap:10px;font-size:13px;color:var(--text1);line-height:1.6}
.cause-dot{width:4px;height:4px;border-radius:50%;background:var(--text2);flex-shrink:0;margin-top:9px}
.step-item{display:flex;gap:10px;font-size:13px;color:var(--text1);line-height:1.6}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text0);flex-shrink:0;margin-top:1px}
.doc-link{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--accent);text-decoration:none;padding:7px 14px;border:1px solid #1a3a60;border-radius:7px;margin-top:4px;background:var(--accent-bg);transition:background .12s}
.doc-link:hover{background:#0f2a50}
#back-btn{display:none;margin-bottom:14px;padding:5px 12px;font-size:12px;cursor:pointer;border:1px solid var(--border2);border-radius:7px;background:transparent;color:var(--text1);transition:background .1s,color .1s}
#back-btn:hover{background:var(--bg2);color:var(--text0)}
.empty-state{padding:48px;text-align:center;color:var(--text2);font-size:13px}
#no-results-sr{padding:9px 12px;color:var(--text2);font-size:13px;cursor:default}

@media(max-width:700px){
  :root{--nav-w:0px}
  #nav{display:none}
  #detail.visible{border-left:none}
  #back-btn{display:inline-flex;align-items:center;gap:5px}
  #app-title{display:none}
}
@media(min-width:701px) and (max-width:980px){
  :root{--nav-w:170px}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="app-title">Intune <span>Error DB</span></div>
    <div id="search-wrap">
      <svg class="s-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="18" y2="18"/></svg>
      <input id="search" type="text" placeholder="Search error code, keyword, cause or fix..." autocomplete="off" spellcheck="false"/>
      <div id="search-results"></div>
    </div>
  </div>
  <div id="body">
    <nav id="nav"></nav>
    <div id="main"><div id="lhdr" class="list-hdr"></div><div id="error-list"></div></div>
    <div id="detail"><button id="back-btn">&#8592; Back</button><div id="detail-content"></div></div>
  </div>
</div>

<script>
const DB=[
  {id:'ap001',cat:'Autopilot',code:'0x80180014',title:'MDM enrollment not configured',desc:'The device cannot complete Autopilot enrollment because MDM auto-enrollment is not configured in Azure AD.',causes:['MDM authority not set to Intune in Azure AD','MDM user scope set to None instead of All or a group','Intune license not assigned to the user','AAD Premium P1/P2 license missing'],steps:['Open Azure AD > Mobility (MDM and MAM) > Microsoft Intune','Set MDM user scope to All or select a group','Assign an Intune license to the affected user','Retry Autopilot enrollment by re-running OOBE'],url:'https://learn.microsoft.com/en-us/mem/autopilot/troubleshoot-oobe'},
  {id:'ap002',cat:'Autopilot',code:'0x80070774',title:'Autopilot profile not assigned',desc:'Device is registered in Autopilot but no deployment profile has been assigned, so OOBE cannot proceed in Autopilot mode.',causes:['Device not in the correct Autopilot group','Profile assignment filter excludes the device','Profile not yet synced — propagation delay','Device hardware hash not correctly registered'],steps:['Check Devices > Enroll devices > Windows enrollment > Deployment profiles','Verify the device is a member of an assigned group','Wait 15 minutes and force a sync','Re-export and re-import the hardware hash if needed'],url:'https://learn.microsoft.com/en-us/mem/autopilot/profiles'},
  {id:'ap003',cat:'Autopilot',code:'0x800705B4',title:'Enrollment Status Page timeout',desc:'The Enrollment Status Page (ESP) timed out before all apps and policies finished applying.',causes:['A required app is taking too long to install','Blocking app not available in Win32 content delivery','ESP timeout set too low (default 60 min)','Network connectivity issues during device setup'],steps:['Increase ESP timeout: Devices > Enroll devices > ESP > Edit > Timeout','Check Win32 app logs at C:\\ProgramData\\Microsoft\\IntuneManagementExtension\\Logs','Exclude non-critical apps from ESP blocking','Verify network access to Intune endpoints'],url:'https://learn.microsoft.com/en-us/mem/intune/enrollment/windows-enrollment-status'},
  {id:'ap004',cat:'Autopilot',code:'0x80180018',title:'Autopilot profile fetch failed',desc:'Device failed to download its Autopilot profile during OOBE. Usually a connectivity or DNS issue.',causes:['No internet access during OOBE','DNS cannot resolve ztd.dds.microsoft.com','Proxy blocking Autopilot service endpoints','Device clock significantly out of sync'],steps:['Verify network connectivity via Shift+F10 > ping 8.8.8.8','Check proxy/firewall allows *.dds.microsoft.com and *.microsoftonline.com','Ensure system clock is correct','Try a wired connection instead of Wi-Fi'],url:'https://learn.microsoft.com/en-us/mem/autopilot/troubleshoot-oobe'},
  {id:'ap005',cat:'Autopilot',code:'0x80180022',title:'Device already enrolled by another user',desc:'The device is already enrolled in Intune under a different account and cannot be re-enrolled without a wipe.',causes:['Previous user enrolled device and left the organisation','Device not de-registered from Autopilot before reassignment','Hybrid join conflict — device is already domain-joined','Device record not cleaned up in Intune'],steps:['Retire/delete the device in Intune: Devices > All devices','Delete the device from Azure AD','Remove the device from Autopilot registered devices','Re-register hardware hash and reassign Autopilot profile'],url:'https://learn.microsoft.com/en-us/mem/autopilot/troubleshoot-oobe'},
  {id:'ap006',cat:'Autopilot',code:'0x80180021',title:'Self-deploying — TPM attestation failed',desc:'Self-Deploying or Pre-provisioning mode failed because the device could not attest its TPM 2.0 chip.',causes:['TPM 2.0 not present or disabled in BIOS','TPM not cleared after previous OS installation','Firmware TPM (fTPM) has a known attestation bug','Network required for attestation is blocked'],steps:['Enable TPM 2.0 in BIOS/UEFI firmware settings','Clear the TPM: tpm.msc > Clear TPM','Update device firmware to latest version','Ensure device can reach has.spserv.microsoft.com'],url:'https://learn.microsoft.com/en-us/mem/autopilot/troubleshoot-device-enrollment'},
  {id:'ap007',cat:'Autopilot',code:'0x80070490',title:'Element not found during Autopilot',desc:'A required element (registry key, account, or configuration) was not found during Autopilot provisioning.',causes:['Local administrator account not created before Autopilot step','Registry key expected by policy missing from base image','Hybrid domain join OU not found in on-premises AD','Autopilot JSON configuration corrupt or incomplete'],steps:['Verify domain join profile OU path matches AD exactly','Check if local admin account creation policy is ordered before this step','Re-export Autopilot configuration JSON from Intune','Review MDMDiagnosticsTool output for missing element details'],url:'https://learn.microsoft.com/en-us/mem/autopilot/troubleshoot-oobe'},
  {id:'ap008',cat:'Autopilot',code:'0x80070032',title:'Hardware does not support self-deploy mode',desc:'Self-Deploying mode requires TPM 2.0 with EK certificate. This device\'s hardware does not meet the requirement.',causes:['Device has TPM 1.2 instead of TPM 2.0','No TPM chip present (older hardware)','Hyper-V VM without virtual TPM enabled','TPM EK certificate not provisioned by manufacturer'],steps:['Verify TPM version: Get-WmiObject -Namespace root\\cimv2\\security\\microsofttpm -Class Win32_TPM','Use User-Driven mode instead of Self-Deploying for non-TPM2.0 devices','Enable vTPM for Hyper-V VMs in VM settings > Security','Contact hardware vendor for TPM EK certificate issues'],url:'https://learn.microsoft.com/en-us/mem/autopilot/self-deploying'},
  {id:'ap009',cat:'Autopilot',code:'0x80180019',title:'MDM terms of use not accepted',desc:'Enrollment blocked because the user has not accepted the MDM Terms of Use configured in Azure AD.',causes:['Terms of Use policy enforced via Conditional Access','User dismissed ToU prompt without accepting','ToU document not accessible to the user','New ToU version published requiring re-acceptance'],steps:['Direct user to myapps.microsoft.com to accept ToU','Check Azure AD > Security > Conditional Access for ToU policy','Verify ToU PDF/URL is accessible to the user','Review Azure AD > Identity Governance > Terms of use for acceptance status'],url:'https://learn.microsoft.com/en-us/azure/active-directory/conditional-access/terms-of-use'},
  {id:'ap010',cat:'Autopilot',code:'0x80190001',title:'ESP blocking app install failed',desc:'A required blocking app in the Enrollment Status Page failed to install, halting provisioning.',causes:['Win32 app detection rule not matching after install','App install returns non-zero exit code','App dependency not met (e.g. VC++ runtime missing)','App content not yet replicated to nearby CDN node'],steps:['Check IntuneManagementExtension.log for specific app failure','Test app install manually as SYSTEM on a similar device','Add required dependency apps and mark as dependency','Wait for CDN replication or retry with different network'],url:'https://learn.microsoft.com/en-us/mem/intune/enrollment/windows-enrollment-status'},
  {id:'app001',cat:'Applications',code:'0x87D1041C',title:'App install failed — detection failure',desc:'Intune believes the app install failed because the detection rule did not match after installation completed.',causes:['Detection rule path, registry key, or version is incorrect','App installed to a different path than expected','Detection script returning wrong exit code','App installed per-user but detection is per-device'],steps:['Review the detection rule under Apps > [App] > Properties','Check if the actual install path matches the detection rule','Test detection script manually on the device','Switch detection type (e.g. from file to registry)'],url:'https://learn.microsoft.com/en-us/mem/intune/apps/apps-win32-troubleshoot'},
  {id:'app002',cat:'Applications',code:'0x87D13B60',title:'Win32 app content download failed',desc:'The Intune Management Extension could not download the Win32 app package from Azure CDN.',causes:['Firewall blocking *.manage.microsoft.com or *.azureedge.net','Insufficient disk space on device','IME service not running','Proxy requiring authentication'],steps:['Check IME log: IntuneManagementExtension.log','Verify firewall allows required Intune URLs','Ensure at least 2 GB free disk space','Restart the Microsoft Intune Management Extension service'],url:'https://learn.microsoft.com/en-us/mem/intune/apps/apps-win32-troubleshoot'},
  {id:'app003',cat:'Applications',code:'0x80004005',title:'Unspecified app installation error',desc:'A generic failure occurred during app installation. Requires log review to determine the root cause.',causes:['Install command syntax error in IntuneWin package','App installer requires user interaction (not silent)','Dependency app not installed first','Insufficient permissions during install'],steps:['Review IntuneManagementExtension.log and AppWorkload.log','Test install command manually in cmd as SYSTEM','Add /quiet /norestart flags to install command','Check if a dependency app needs to be installed first'],url:'https://learn.microsoft.com/en-us/mem/intune/apps/apps-win32-troubleshoot'},
  {id:'app004',cat:'Applications',code:'0x87D10126',title:'App not applicable to device',desc:'The assignment filter or requirement rules determined this app should not be installed on the device.',causes:['Requirement rule (OS version, disk space, registry) not met','Assignment filter excludes this device','App targeted to a group the device is not in','32-bit app excluded on 64-bit OS requirement'],steps:['Check the app requirement rules under Apps > Properties','Review assignment filters assigned to the app','Confirm device is in the correct Azure AD group','Verify app architecture matches device architecture'],url:'https://learn.microsoft.com/en-us/mem/intune/apps/apps-win32-app-management'},
  {id:'app005',cat:'Applications',code:'0x87D13B62',title:'Win32 app uninstall failed',desc:'Intune attempted to remove a Win32 app but the uninstall command failed or the detection rule still matches after removal.',causes:['Uninstall command incorrect or missing silent switch','App partially removed — detection rule still matches','Another process locking app files during uninstall','Registry entry persists after uninstall'],steps:['Verify uninstall command with /quiet or /S switch','Test uninstall command manually as SYSTEM','Check detection rule — must NOT match after successful uninstall','Review IntuneManagementExtension.log for exit code'],url:'https://learn.microsoft.com/en-us/mem/intune/apps/apps-win32-troubleshoot'},
  {id:'app006',cat:'Applications',code:'0x87D1041D',title:'App install timed out',desc:'The Win32 app installation exceeded the maximum allowed install time (default 60 minutes) and was terminated.',causes:['App installer is large and download is slow','Installer waiting for user input (not fully silent)','Anti-virus scanning causing installer to hang','Device low on resources during install'],steps:['Increase install timeout in App > Properties > Program > Maximum allowed run time','Ensure installer runs silently without GUI prompts','Temporarily exclude installer path from AV scanning','Test on a device with better resources'],url:'https://learn.microsoft.com/en-us/mem/intune/apps/apps-win32-troubleshoot'},
  {id:'app007',cat:'Applications',code:'0x87D10901',title:'Microsoft Store app failed to install',desc:'A Microsoft Store app failed to install via Intune.',causes:['Device not connected to Windows Update or Store endpoints','Assigned store app removed from the Store','Store license not available or all licenses consumed','WinGet/AppX service not running on device'],steps:['Check Windows Update connectivity and Store access','Verify app still exists in Microsoft Store','Review available license count in Intune > Apps','Run: wsreset.exe and retry','Restart AppX Deployment Service'],url:'https://learn.microsoft.com/en-us/mem/intune/apps/windows-store-for-business'},
  {id:'app008',cat:'Applications',code:'0x80070643',title:'Fatal error during MSI installation (1603)',desc:'The MSI installer returned error 1603, a generic fatal error during installation.',causes:['A previous version is still installed','Installer requires a reboot from a prior installation','Insufficient permissions for the install location','MSI transform file (.mst) incompatible with this MSI version'],steps:['Check Add/Remove Programs for existing versions and uninstall first','Reboot device and retry installation','Review Windows Installer log at %TEMP%\\MSI*.log','Remove or update .mst transform file'],url:'https://learn.microsoft.com/en-us/mem/intune/apps/apps-win32-troubleshoot'},
  {id:'app009',cat:'Applications',code:'0x87D1041B',title:'App install pending reboot',desc:'Intune is waiting for the device to reboot before completing the app installation.',causes:['Previous app or Windows Update left a PendingFileRenameOperations registry key','App installer itself requested a reboot','ESP blocking reboot during provisioning','RebootRequired flag set in IME'],steps:['Reboot the device and allow Intune to retry','Check HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\PendingFileRenameOperations','Configure a reboot policy or allow IME to trigger reboot','If during ESP, ensure ESP allows reboots in settings'],url:'https://learn.microsoft.com/en-us/mem/intune/apps/apps-win32-troubleshoot'},
  {id:'app010',cat:'Applications',code:'0x87D1041E',title:'Supersedence uninstall failed',desc:'Intune tried to uninstall an older superseded app version before installing the new one, but the uninstall step failed.',causes:['Old app uninstall command not working silently','Detection rule for old version still matches after uninstall attempt','Multiple older versions requiring separate uninstall steps','App is locked by a running process'],steps:['Verify the supersedence uninstall command in Apps > [New app] > Supersedence','Check detection rule for old version','Kill any running instances of the app before retry','Add a pre-install script to terminate app processes'],url:'https://learn.microsoft.com/en-us/mem/intune/apps/apps-win32-supersedence'},
  {id:'app011',cat:'Applications',code:'0x87D10800',title:'LOB app — package validation failed',desc:'Intune rejected a Line-of-Business app package because the file failed validation.',causes:['Corrupted upload — file hash mismatch','Unsupported file type or wrong extension for selected app type','App file exceeds maximum upload size (8 GB for Win32)','IntuneWin file not created with IntuneWinAppUtil.exe'],steps:['Re-download or re-build the app package','Re-wrap with the Microsoft Win32 Content Prep Tool','Check the file size is under 8 GB','Upload again on a stable network connection'],url:'https://learn.microsoft.com/en-us/mem/intune/apps/apps-win32-prepare'},
  {id:'app012',cat:'Applications',code:'0x8000FFFF',title:'Catastrophic failure — IME crashed',desc:'The Intune Management Extension encountered a catastrophic unhandled error due to a corrupted state or service crash.',causes:['IME service in a crash loop','Corrupted IME database or cache','PowerShell execution policy preventing IME operation','Windows component dependency failed'],steps:['Restart IME service: Restart-Service IntuneManagementExtension','Clear IME cache: delete contents of C:\\Program Files (x86)\\Microsoft Intune Management Extension\\Content','Re-enroll device or run dsregcmd /leave then re-join','Check Windows Event Viewer > Application for IME crash details'],url:'https://learn.microsoft.com/en-us/mem/intune/apps/intune-management-extension'},
  {id:'comp001',cat:'Compliance',code:'0x87D1FDE8',title:'Compliance policy evaluation failed',desc:'Intune could not evaluate the compliance policy on the device. It reports an error rather than compliant or non-compliant.',causes:['Policy contains a setting not supported on this OS version','WMI or health attestation service issue on device','Device not checking in to Intune properly','Conflicting compliance policies'],steps:['Check compliance policy settings for OS version compatibility','Run: winrm quickconfig and restart Health Attestation service','Trigger a manual sync: Settings > Accounts > Access work > Sync','Review Intune device logs for specific policy error'],url:'https://learn.microsoft.com/en-us/mem/intune/protect/compliance-policy-monitor'},
  {id:'comp002',cat:'Compliance',code:'0x87D100C9',title:'BitLocker compliance not met',desc:'Device is non-compliant because BitLocker encryption requirements are not satisfied.',causes:['BitLocker not enabled on OS drive','BitLocker enabled but not using required encryption method','TPM not present or not ready','BIOS/UEFI in legacy mode instead of UEFI'],steps:['Run: manage-bde -status to check BitLocker status','Verify TPM is enabled in BIOS and visible in tpm.msc','Ensure device boots in UEFI mode with Secure Boot','Enable BitLocker via Intune disk encryption policy'],url:'https://learn.microsoft.com/en-us/mem/intune/protect/encrypt-devices'},

let activeCat=null,activeId=null;

function cats(){return[...new Set(DB.map(e=>e.cat))];}

function renderNav(){
  const nav=document.getElementById('nav');nav.innerHTML='';
  const all=mk('div','nav-item'+(activeCat===null?' active':''));
  all.innerHTML=`<span>All errors</span><span class="nav-badge">${DB.length}</span>`;
  all.onclick=()=>{activeCat=null;activeId=null;renderNav();renderList();hideDetail();};
  nav.appendChild(all);
  const h=mk('div','cat-label');h.textContent='Categories';nav.appendChild(h);
  cats().forEach(c=>{
    const n=DB.filter(e=>e.cat===c).length;
    const el=mk('div','nav-item'+(activeCat===c?' active':''));
    el.innerHTML=`<span>${esc(c)}</span><span class="nav-badge">${n}</span>`;
    el.onclick=()=>{activeCat=c;activeId=null;renderNav();renderList();hideDetail();};
    nav.appendChild(el);
  });
}

function filtered(){return activeCat===null?DB:DB.filter(e=>e.cat===activeCat);}

function renderList(){
  const el=document.getElementById('error-list');
  const hdr=document.getElementById('lhdr');
  const errs=filtered();
  hdr.textContent=`${errs.length} error${errs.length!==1?'s':''} ${activeCat?'in '+activeCat:'total'}`;
  el.innerHTML='';
  if(!errs.length){el.innerHTML='<div class="empty-state">No errors in this category.</div>';return;}
  errs.forEach(e=>{
    const card=mk('div','error-card'+(activeId===e.id?' active':''));
    card.innerHTML=`<div class="ec-top"><span class="ec-code">${esc(e.code)}</span></div><div class="ec-title">${esc(e.title)}</div><div class="ec-desc">${esc(e.desc)}</div>`;
    card.onclick=()=>{activeId=e.id;renderList();showDetail(e);};
    el.appendChild(card);
  });
}

function showDetail(e){
  document.getElementById('detail').classList.add('visible');
  document.getElementById('main').style.display='none';
  const causes=e.causes.map(c=>`<div class="cause-item"><div class="cause-dot"></div><div>${esc(c)}</div></div>`).join('');
  const steps=e.steps.map((s,i)=>`<div class="step-item"><div class="step-num">${i+1}</div><div>${esc(s)}</div></div>`).join('');
  document.getElementById('detail-content').innerHTML=`
    <div class="detail-code-row"><span class="detail-code">${esc(e.code)}</span><span class="detail-cat">${esc(e.cat)}</span></div>
    <div class="detail-title">${esc(e.title)}</div>
    <div class="detail-desc">${esc(e.desc)}</div>
    <div class="sec-label">Common causes</div>
    <div class="causes-list">${causes}</div>
    <div class="sec-label">Resolution steps</div>
    <div class="steps-list">${steps}</div>
    <div class="sec-label">Documentation</div>
    <a class="doc-link" href="${esc(e.url)}" target="_blank">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6H2V3h6"/><polyline points="13 1 19 1 19 7"/><line x1="8" y1="12" x2="19" y2="1"/></svg>
      Microsoft Learn
    </a>`;
}

function hideDetail(){
  document.getElementById('detail').classList.remove('visible');
  document.getElementById('main').style.display='block';
}

document.getElementById('back-btn').onclick=()=>{activeId=null;renderList();hideDetail();};

function mk(tag,cls){const el=document.createElement(tag);if(cls)el.className=cls;return el;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const srchEl=document.getElementById('search');
const resEl=document.getElementById('search-results');

srchEl.addEventListener('input',()=>{
  const q=srchEl.value.trim().toLowerCase();
  if(!q){resEl.style.display='none';return;}
  const hits=DB.filter(e=>
    e.code.toLowerCase().includes(q)||e.title.toLowerCase().includes(q)||
    e.desc.toLowerCase().includes(q)||e.cat.toLowerCase().includes(q)||
    e.causes.some(c=>c.toLowerCase().includes(q))||e.steps.some(s=>s.toLowerCase().includes(q))
  ).slice(0,10);
  if(!hits.length){
    resEl.innerHTML='<div id="no-results-sr">No results found</div>';
    resEl.style.display='block';return;
  }
  resEl.innerHTML=hits.map(e=>`<div class="sr-item" data-id="${esc(e.id)}"><span class="sr-code">${esc(e.code)}</span><span class="sr-title">${esc(e.title)}</span><span class="sr-cat">${esc(e.cat)}</span></div>`).join('');
  resEl.style.display='block';
  resEl.querySelectorAll('.sr-item[data-id]').forEach(item=>{
    item.addEventListener('click',()=>{
      const err=DB.find(e=>e.id===item.dataset.id);
      if(!err)return;
      srchEl.value='';resEl.style.display='none';
      activeCat=err.cat;activeId=err.id;
      renderNav();renderList();showDetail(err);
    });
  });
});

document.addEventListener('click',e=>{
  if(!document.getElementById('search-wrap').contains(e.target))resEl.style.display='none';
});
srchEl.addEventListener('keydown',e=>{if(e.key==='Escape'){resEl.style.display='none';srchEl.value='';}});

renderNav();renderList();
</script>
</body>
</html>
